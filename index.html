<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Samu 💗</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated background elements -->
    <div class="background-container">
        <div class="hearts-container" id="heartsContainer"></div>
        <div class="sparkles-container" id="sparklesContainer"></div>
    </div>

    <!-- Main content -->
    <div class="content-wrapper">
        <!-- Title Section -->
        <section class="title-section">
            <h1 class="title floating">Happy Birthday Sambridhi 💗</h1>
        </section>

        <!-- Password Box Section -->
        <section class="password-section">
            <div class="password-box">
                <input
                    type="password"
                    id="passwordInput"
                    class="password-input"
                    placeholder="Enter password..."
                    autocomplete="off"
                >
                <button class="btn btn-primary" id="unlockBtn">Unlock Gallery</button>
            </div>
            <div class="error-message" id="errorMsg"></div>
        </section>

        <!-- Cake Section -->
        <section class="cake-section">
            <div class="cake-container floating">
                <div class="cake-wrapper">
                    <!-- Cake -->
                    <div class="cake">
                        <!-- Frosting on top -->
                        <div class="frosting"></div>
                        
                        <!-- Top Layer -->
                        <div class="cake-layer layer-top">
                            <div class="layer-shine"></div>
                        </div>
                        
                        <!-- Middle Layer -->
                        <div class="cake-layer layer-middle">
                            <div class="layer-shine"></div>
                        </div>
                        
                        <!-- Bottom Layer -->
                        <div class="cake-layer layer-bottom">
                            <div class="layer-shine"></div>
                        </div>
                    </div>

                    <!-- Candles -->
                    <div class="candles">
                        <div class="candle">
                            <div class="flame flicker"></div>
                        </div>
                        <div class="candle">
                            <div class="flame flicker"></div>
                        </div>
                        <div class="candle">
                            <div class="flame flicker"></div>
                        </div>
                    </div>
                </div>

                <!-- Cake glow -->
                <div class="cake-glow"></div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>Made with lots of love 💗</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
